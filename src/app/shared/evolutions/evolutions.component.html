<div class="box">
    <div class="card active" *ngFor="let item of allEvolutions">
        <div class="imgBx">
            <img [src]="item.image" alt="images" />
        </div>
        <div class="details">
            <h2>
                {{ item.species_name }}<br /><span>{{ item.urlId }}</span>
            </h2>
        </div>
    </div>
</div>
